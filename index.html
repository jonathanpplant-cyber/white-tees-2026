<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The White Tees 2026 Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f4f4f2; color: #1a2b3c; font-family: 'Georgia', serif; }
        .navy-bg { background-color: #1a2b3c; }
        .gold-text { color: #c5a059; }
        .gold-border { border-color: #c5a059; }
        .btn-gold { background-color: #c5a059; color: #1a2b3c; font-weight: bold; }
        .btn-gold:hover { background-color: #b08d4a; }
    </style>
</head>
<body class="pb-10">

    <header class="navy-bg text-white p-8 text-center shadow-xl border-b-4 gold-border">
        <h1 class="text-4xl font-bold tracking-tighter uppercase">The White Tees</h1>
        <p class="gold-text tracking-widest mt-2">2026 CHALLENGE</p>
    </header>

    <div class="max-w-2xl mx-auto px-4 mt-8">
        
        <div class="flex mb-6 border-b gold-border">
            <button onclick="showTab('entry')" class="flex-1 py-2 font-bold text-center border-b-4 border-transparent hover:border-blue-900" id="tab-entry">Submit Score</button>
            <button onclick="showTab('leaderboard')" class="flex-1 py-2 font-bold text-center border-b-4 border-transparent hover:border-blue-900" id="tab-leader">Leaderboard</button>
        </div>

        <div id="entry-section" class="bg-white p-6 rounded-lg shadow-lg border gold-border">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">Captain's Entry</h2>
            <form id="golfForm">
                <div class="mb-4">
                    <label class="block font-bold mb-1">Select Team</label>
                    <select name="team" class="w-full p-3 border rounded bg-gray-50" required>
                        <option value="">-- Choose Team --</option>
                        <option>The GOAT</option><option>Fairway to Heaven</option>
                        <option>White Tee Titans</option><option>The White Bandits</option>
                        <option>The Scramblers</option><option>The A-Team</option>
                        <option>Blancety Blanc</option><option>Pointy Elbows</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="block font-bold mb-1">Player Name</label>
                    <input type="text" name="player" class="w-full p-3 border rounded" placeholder="e.g. Chris Fox" required>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block font-bold mb-1">Gross Score</label>
                        <input type="number" name="gross" class="w-full p-3 border rounded" required>
                    </div>
                    <div>
                        <label class="block font-bold mb-1">Handicap (100%)</label>
                        <input type="number" step="0.1" name="handicap" class="w-full p-3 border rounded" required>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full btn-gold py-4 rounded shadow-md transition duration-200">
                    SUBMIT TO GOOGLE SHEET
                </button>
            </form>
            <div id="statusMsg" class="mt-4 text-center font-bold hidden"></div>
        </div>

        <div id="leaderboard-section" class="hidden animate-fadeIn">
            <div class="bg-white p-2 rounded shadow-lg border gold-border overflow-hidden">
                <iframe class="w-full h-[600px]" src="https://docs.google.com/spreadsheets/d/e/https://docs.google.com/spreadsheets/d/e/2PACX-1vS6Imn0SGs-PthFvQhgDzcVhGkNE0eKZjU6mJkMjbCTj1u30GnbAFwUGz9sibXd7WbqWv_VUZkaXj2t/pubhtml?gid=1210635248&single=true/pubhtml?gid=YOUR_GID_HERE&range=A1:C10&widget=false&headers=false"></iframe>
            </div>
            <p class="text-xs text-center mt-2 text-gray-500 italic">Leaderboard updates every 5 minutes</p>
        </div>

    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw_6WZFgFJyHKwdNxVK40BDwbIi-55xkBxUomFitL-hQfYIsujaKizjG1hr_Q2sJW87/exec';
        const form = document.getElementById('golfForm');
        const statusMsg = document.getElementById('statusMsg');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', e => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerHTML = "Processing...";
            statusMsg.classList.remove('hidden');
            statusMsg.innerHTML = "Connecting to Google Sheets...";
            statusMsg.style.color = "blue";

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    statusMsg.innerHTML = "✅ Score Successfully Recorded!";
                    statusMsg.style.color = "green";
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = "SUBMIT ANOTHER SCORE";
                    form.reset();
                })
                .catch(error => {
                    statusMsg.innerHTML = "❌ Error! Check connection.";
                    statusMsg.style.color = "red";
                    submitBtn.disabled = false;
                    console.error('Error!', error.message);
                });
        });

        function showTab(tab) {
            if(tab === 'entry') {
                document.getElementById('entry-section').classList.remove('hidden');
                document.getElementById('leaderboard-section').classList.add('hidden');
            } else {
                document.getElementById('entry-section').classList.add('hidden');
                document.getElementById('leaderboard-section').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
