<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The White Tees 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f4f4f2; color: #1a2b3c; font-family: 'Georgia', serif; }
        .navy-bg { background-color: #1a2b3c; }
        .gold-text { color: #c5a059; }
        .gold-border { border-color: #c5a059; }
        .btn-gold { background-color: #c5a059; color: #1a2b3c; font-weight: bold; }
        .btn-gold:hover { background-color: #b08d4a; }
        .tab-active { border-bottom: 4px solid #1a2b3c; color: #1a2b3c; }
    </style>
</head>
<body class="pb-10">

    <header class="navy-bg text-white p-6 text-center shadow-xl border-b-4 gold-border">
        <h1 class="text-3xl font-bold tracking-tighter uppercase">The White Tees</h1>
        <p class="gold-text tracking-widest text-sm mt-1">2026 CHALLENGE</p>
    </header>

    <div class="max-w-md mx-auto px-4 mt-6">
        
        <div class="flex mb-6 justify-center space-x-8 border-b border-gray-300">
            <button onclick="showTab('entry')" id="btn-entry" class="pb-2 font-bold tab-active">Submit Score</button>
            <button onclick="showTab('leader')" id="btn-leader" class="pb-2 font-bold text-gray-400">Leaderboard</button>
        </div>

        <div id="entry-section" class="bg-white p-6 rounded-lg shadow-md border gold-border">
            <form id="golfForm">
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-1">Team Name</label>
                    <select name="team" class="w-full p-3 border rounded bg-gray-50" required>
                        <option value="">-- Select Team --</option>
                        <option>The GOAT</option><option>Fairway to Heaven</option>
                        <option>White Tee Titans</option><option>The White Bandits</option>
                        <option>The Scramblers</option><option>The A-Team</option>
                        <option>Blancety Blanc</option><option>Pointy Elbows</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-bold mb-1">Player Name</label>
                    <input type="text" name="player" class="w-full p-3 border rounded" placeholder="First & Last Name" required>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-bold mb-1">Gross Score</label>
                        <input type="number" name="gross" class="w-full p-3 border rounded" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Handicap</label>
                        <input type="number" step="0.1" name="handicap" class="w-full p-3 border rounded" required>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full btn-gold py-4 rounded shadow-md uppercase tracking-widest">
                    Record Score
                </button>
            </form>
            <div id="statusMsg" class="mt-4 text-center font-bold hidden px-2 py-2 rounded"></div>
        </div>

        <div id="leader-section" class="hidden">
            <div class="bg-white rounded shadow-md border gold-border overflow-hidden">
                <iframe class="w-full h-[500px]" src="PASTE_YOUR_PUBLISHED_LINK_HERE"></iframe>
            </div>
            <p class="text-center text-xs text-gray-500 mt-3 italic">Updates every 5 minutes</p>
        </div>

    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw_6WZFgFJyHKwdNxVK40BDwbIi-55xkBxUomFitL-hQfYIsujaKizjG1hr_Q2sJW87/exec';
        const form = document.getElementById('golfForm');
        const statusMsg = document.getElementById('statusMsg');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', e => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerHTML = "Sending...";
            
            fetch(scriptURL, { method: 'POST', body: new FormData(form), mode: 'no-cors' })
                .then(() => {
                    statusMsg.classList.remove('hidden');
                    statusMsg.innerHTML = "✅ Score Recorded Successfully!";
                    statusMsg.className = "mt-4 text-center font-bold bg-green-100 text-green-700 p-2 rounded";
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = "Record Another Score";
                    form.reset();
                })
                .catch(error => {
                    statusMsg.classList.remove('hidden');
                    statusMsg.innerHTML = "❌ Connection Error. Try again.";
                    statusMsg.className = "mt-4 text-center font-bold bg-red-100 text-red-700 p-2 rounded";
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = "Record Score";
                });
        });

        function showTab(tab) {
            const entrySec = document.getElementById('entry-section');
            const leaderSec = document.getElementById('leader-section');
            const btnEntry = document.getElementById('btn-entry');
            const btnLeader = document.getElementById('btn-leader');

            if(tab === 'entry') {
                entrySec.classList.remove('hidden');
                leaderSec.classList.add('hidden');
                btnEntry.className = "pb-2 font-bold tab-active";
                btnLeader.className = "pb-2 font-bold text-gray-400";
            } else {
                entrySec.classList.add('hidden');
                leaderSec.classList.remove('hidden');
                btnEntry.className = "pb-2 font-bold text-gray-400";
                btnLeader.className = "pb-2 font-bold tab-active";
            }
        }
    </script>
</body>
</html>
