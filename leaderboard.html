<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The White Tees - Standings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .navy-bg { background-color: #001f3f; }
        .gold-border { border-color: #c5a059; }
        .gold-text { color: #c5a059; }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen pb-12 text-gray-800">

    <header class="navy-bg text-white p-6 text-center shadow-xl border-b-4 gold-border">
        <img src="./The White tees logo.png" alt="Logo" class="mx-auto w-48 h-48 mb-4 rounded-full border-4 gold-border object-cover">
        <h1 class="text-2xl font-bold uppercase tracking-widest">Championship Standings</h1>
        <button onclick="loadLeaderboard()" id="refreshBtn" class="mt-4 inline-flex items-center gap-2 bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all">
            <span id="refreshIcon">🔄</span> Refresh Live
        </button>
    </header>

    <main class="max-w-2xl mx-auto mt-6 px-4 space-y-8">
        
        <section>
            <div class="flex items-center justify-between mb-3 px-2">
                <h2 class="text-sm font-black uppercase tracking-widest text-blue-900">Current Month: <span id="currentMonthName" class="gold-text">...</span></h2>
                <span class="text-[9px] bg-blue-100 text-blue-800 px-2 py-1 rounded font-bold uppercase">Monthly Points</span>
            </div>
            <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-blue-100">
                <table class="w-full text-left">
                    <tbody id="monthlyBody" class="divide-y divide-gray-50 text-sm">
                        </tbody>
                </table>
            </div>
        </section>

        <section>
            <div class="flex items-center justify-between mb-3 px-2 border-t pt-6 border-gray-200">
                <h2 class="text-sm font-black uppercase tracking-widest text-gray-500 italic">Overall Season Standings</h2>
                <span class="text-[9px] bg-gray-100 text-gray-600 px-2 py-1 rounded font-bold uppercase">Total Points</span>
            </div>
            <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                        <tr>
                            <th class="p-4">Rank</th>
                            <th class="p-4">Team</th>
                            <th class="p-4 text-right">Total</th>
                        </tr>
                    </thead>
                    <tbody id="seasonBody" class="divide-y divide-gray-50 text-sm">
                        </tbody>
                </table>
            </div>
        </section>

        <div class="text-center pt-4">
            <a href="index.html" class="text-[10px] font-bold text-blue-900 hover:underline uppercase tracking-[0.2em]">← Enter New Scorecard</a>
        </div>
    </main>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw_6WZFgFJyHKwdNxVK40BDwbIi-55xkBxUomFitL-hQfYIsujaKizjG1hr_Q2sJW87/exec';

async function loadLeaderboard() {
    const monthlyBody = document.getElementById('monthlyBody');
    const seasonBody = document.getElementById('seasonBody');
    const icon = document.getElementById('refreshIcon');
    
    icon.classList.add('loading-spin');

    try {
        const response = await fetch(`${scriptURL}?action=readLeaderboard&t=${new Date().getTime()}`);
        const data = await response.json();
        
// Render Monthly Section
monthlyBody.innerHTML = data.monthly.map((row, i) => `
    <tr class="hover:bg-blue-50/50 transition-colors">
        <td class="p-4 w-12 font-bold text-blue-900 text-lg">${i+1}</td>
        <td class="p-4">
            <div class="font-black uppercase text-blue-900 tracking-tight">${row.team}</div>
            <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                Round Score: <span class="text-blue-600">${row.score}</span>
            </div>
        </td>
        <td class="p-4 text-right">
            <span class="text-xl font-black text-blue-900">${row.points}</span>
            <span class="text-[10px] font-bold text-gray-400 uppercase ml-1">pts</span>
        </td>
    </tr>
`).join('');

        // Render Season (Pulling from Column I)
        seasonBody.innerHTML = data.season.map((row, i) => `
            <tr class="hover:bg-gray-50">
                <td class="p-4 w-12 font-bold text-gray-400">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1}</td>
                <td class="p-4 font-medium">${row.team}</td>
                <td class="p-4 text-right font-bold text-blue-900">${row.points}</td>
            </tr>
        `).join('');

    } catch (error) {
        console.error(error);
        monthlyBody.innerHTML = '<tr><td class="p-8 text-center text-red-400 text-xs uppercase">Check Script Deployment</td></tr>';
    } finally {
        icon.classList.remove('loading-spin');
    }
}

        loadLeaderboard();
    </script>
</body>
</html>
