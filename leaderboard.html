<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The White Tees - Live Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .navy-bg { background-color: #001f3f; }
        .gold-border { border-color: #c5a059; }
        .gold-text { color: #c5a059; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <header class="navy-bg text-white p-6 text-center shadow-xl border-b-4 gold-border">
        <img src="./The White tees logo.png" alt="Logo" class="mx-auto w-48 h-48 mb-42 rounded-full border-4 gold-border object-cover">
        <h1 class="text-2xl font-bold uppercase tracking-widest">Season Standings</h1>
        <p class="gold-text text-xs tracking-widest mt-1 uppercase">Live Rankings</p>
    </header>

    <main class="max-w-2xl mx-auto mt-8 px-4">
        <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100">
            <table class="w-full text-left border-collapse">
                <thead class="navy-bg text-white uppercase text-xs tracking-wider">
                    <tr>
                        <th class="p-4">Rank</th>
                        <th class="p-4">Team</th>
                        <th class="p-4 text-right">Points</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr>
                        <td colspan="3" class="p-8 text-center text-gray-400">Loading standings...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="mt-8 text-center">
            <a href="index.html" class="text-blue-900 font-bold hover:underline">← Back to Score Entry</a>
        </div>
    </main>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw_6WZFgFJyHKwdNxVK40BDwbIi-55xkBxUomFitL-hQfYIsujaKizjG1hr_Q2sJW87/exec';

        async function loadLeaderboard() {
            try {
const response = await fetch(`${scriptURL}?action=readLeaderboard`);
        const data = await response.json();
                
                const tbody = document.getElementById('leaderboardBody');
                tbody.innerHTML = '';

                data.forEach((row, index) => {
                    const tr = document.createElement('tr');
                    tr.className = "border-b border-gray-50 hover:bg-gray-50 transition-colors";
                    
                    // Highlight top 3
                    let rankDisplay = index + 1;
                    if(index === 0) rankDisplay = '🥇';
                    if(index === 1) rankDisplay = '🥈';
                    if(index === 2) rankDisplay = '🥉';

                    tr.innerHTML = `
                        <td class="p-4 font-bold text-gray-600">${rankDisplay}</td>
                        <td class="p-4 font-medium">${row.team}</td>
                        <td class="p-4 text-right font-bold text-blue-900">${row.points}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                document.getElementById('leaderboardBody').innerHTML = '<tr><td colspan="3" class="p-8 text-center text-red-500">Failed to load leaderboard.</td></tr>';
            }
        }

<a href="leaderboard.html" class="block text-center mt-4 text-sm text-blue-900 underline">View Live Leaderboard</a>
    </script>
</body>
</html>
